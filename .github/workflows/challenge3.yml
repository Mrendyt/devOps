name : Challenge 3 - Check var set exists
env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
    workflow_dispatch:

jobs:
    check_resource:
        runs-on: ubuntu-latest
        outputs:
            skip: ${{ steps.check.outputs.skip }}
        steps:
            - uses: actions/checkout@v4
            - name: check mock resource
              id: check
              shell: bash
              run: |
                if [ -f resource-exists.txt ]; then
                    echo "skip=true" >> "$GITHUB_OUTPUT"
                else
                    echo "skip=false" >> "$GITHUB_OUTPUT"
                fi
    create_resource:
        runs-on: ubuntu-latest
        needs: check_resource
        if: needs.check_resource.outputs.skip == 'false'
        steps:
            - name: create mock resource
              run: | 
                  echo "This is a mock resource" > resource-exists.txt   
                  
                  if [ -f resource-exists.txt ]; then
                      echo "file found"
                  else
                      echo "file not found" 
                  fi
